<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SindacAI — Accedi</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --blu: #1a2e4a; --blu-mid: #2c4a6e; --blu-light: #e8f0f8;
    --oro: #c4923a; --oro-light: #f5e9d5;
    --testo: #1a1a1a; --testo-muted: #6b7280;
    --bg: #f7f5f0; --card: #ffffff; --bordo: #e2ddd5;
    --verde: #2d6a4f; --verde-light: #d8f3dc;
    --rosso: #dc2626; --rosso-light: #fef2f2;
  }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--testo); min-height: 100dvh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 1rem; }

  .login-container { width: 100%; max-width: 420px; }

  .logo-wrap { text-align: center; margin-bottom: 2rem; }
  .logo-icon { width: 52px; height: 52px; background: var(--blu); border-radius: 14px; display: flex; align-items: center; justify-content: center; margin: 0 auto 0.8rem; border-bottom: 3px solid var(--oro); }
  .logo-icon svg { width: 26px; height: 26px; }
  .logo-title { font-family: 'Playfair Display', serif; font-size: 1.6rem; font-weight: 600; color: var(--blu); }
  .logo-sub { font-size: 0.82rem; color: var(--testo-muted); margin-top: 4px; }

  .card { background: var(--card); border: 1px solid var(--bordo); border-radius: 16px; padding: 2rem; }

  .tabs { display: flex; gap: 0; margin-bottom: 1.8rem; border-bottom: 1px solid var(--bordo); }
  .tab { flex: 1; text-align: center; padding: 0.65rem; font-size: 0.88rem; font-weight: 500; color: var(--testo-muted); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.15s; }
  .tab.active { color: var(--blu); border-bottom-color: var(--blu); }

  .form-group { margin-bottom: 1.1rem; }
  label { display: block; font-size: 0.8rem; font-weight: 500; color: var(--testo); margin-bottom: 5px; }
  input { width: 100%; padding: 0.65rem 0.9rem; border: 1.5px solid var(--bordo); border-radius: 10px; font-family: 'DM Sans', sans-serif; font-size: 0.88rem; color: var(--testo); background: var(--bg); outline: none; transition: border-color 0.15s; }
  input:focus { border-color: var(--blu-mid); background: white; }

  .btn-primary { width: 100%; padding: 0.75rem; background: var(--blu); color: white; border: none; border-radius: 10px; font-family: 'DM Sans', sans-serif; font-size: 0.9rem; font-weight: 500; cursor: pointer; transition: background 0.15s; margin-top: 0.5rem; }
  .btn-primary:hover { background: var(--blu-mid); }
  .btn-primary:disabled { background: var(--bordo); cursor: not-allowed; }

  .error-msg { background: var(--rosso-light); color: var(--rosso); border: 1px solid #fecaca; border-radius: 8px; padding: 0.7rem 0.9rem; font-size: 0.82rem; margin-bottom: 1rem; display: none; }
  .error-msg.visibile { display: block; }

  .success-msg { background: var(--verde-light); color: var(--verde); border: 1px solid #86efac; border-radius: 8px; padding: 0.7rem 0.9rem; font-size: 0.82rem; margin-bottom: 1rem; display: none; }
  .success-msg.visibile { display: block; }

  .divider { display: flex; align-items: center; gap: 0.8rem; margin: 1.2rem 0; color: var(--testo-muted); font-size: 0.78rem; }
  .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--bordo); }

  .btn-google { width: 100%; padding: 0.7rem; background: white; color: var(--testo); border: 1.5px solid var(--bordo); border-radius: 10px; font-family: 'DM Sans', sans-serif; font-size: 0.88rem; font-weight: 500; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: all 0.15s; }
  .btn-google:hover { border-color: var(--blu-mid); background: var(--bg); }
  .btn-google svg { width: 18px; height: 18px; }

  .footer-note { text-align: center; font-size: 0.75rem; color: var(--testo-muted); margin-top: 1.5rem; line-height: 1.5; }
</style>
</head>
<body>

<div class="login-container">
  <div class="logo-wrap">
    <div class="logo-icon">
      <svg viewBox="0 0 20 20" fill="none"><path d="M10 2L13 7H17L14 11L15.5 16L10 13L4.5 16L6 11L3 7H7L10 2Z" fill="white" stroke="white" stroke-width="0.5"/></svg>
    </div>
    <div class="logo-title">SindacAI</div>
    <div class="logo-sub">Consulente AI del diritto del lavoro</div>
  </div>

  <div class="card">
    <div class="tabs">
      <div class="tab active" id="tab-login" onclick="switchTab('login')">Accedi</div>
      <div class="tab" id="tab-register" onclick="switchTab('register')">Registrati</div>
    </div>

    <div id="error-msg" class="error-msg"></div>
    <div id="success-msg" class="success-msg"></div>

    <!-- FORM LOGIN -->
    <div id="form-login">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="login-email" placeholder="la-tua@email.it" autocomplete="email">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password">
      </div>
      <button class="btn-primary" id="btn-login" onclick="login()">Accedi</button>

      <div class="divider">oppure</div>
      <button class="btn-google" onclick="loginGoogle()">
        <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Continua con Google
      </button>
    </div>

    <!-- FORM REGISTRAZIONE -->
    <div id="form-register" style="display:none">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="reg-email" placeholder="la-tua@email.it" autocomplete="email">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="reg-password" placeholder="Minimo 8 caratteri" autocomplete="new-password">
      </div>
      <div class="form-group">
        <label>Conferma password</label>
        <input type="password" id="reg-password2" placeholder="Ripeti la password" autocomplete="new-password">
      </div>
      <button class="btn-primary" id="btn-register" onclick="register()">Crea account</button>

      <div class="divider">oppure</div>
      <button class="btn-google" onclick="loginGoogle()">
        <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Continua con Google
      </button>
    </div>
  </div>

  <div class="footer-note">
    Registrandoti accetti i termini di servizio.<br>Le tue conversazioni sono private e protette.
  </div>
</div>

<script>
const SUPABASE_URL = 'https://daayjuwrfpxttqxztaci.supabase.co';
const SUPABASE_KEY = 'sb_publishable_VFJL9GuCoxDxiRF8E9UQfA_fEqpF_te';
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

sb.auth.onAuthStateChange((event, session) => {
  if (session) window.location.href = '/';
});

function switchTab(tab) {
  document.getElementById('tab-login').classList.toggle('active', tab === 'login');
  document.getElementById('tab-register').classList.toggle('active', tab === 'register');
  document.getElementById('form-login').style.display = tab === 'login' ? 'block' : 'none';
  document.getElementById('form-register').style.display = tab === 'register' ? 'block' : 'none';
  nascondiMsg();
}

function mostraErrore(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg;
  el.classList.add('visibile');
  document.getElementById('success-msg').classList.remove('visibile');
}

function mostraSuccesso(msg) {
  const el = document.getElementById('success-msg');
  el.textContent = msg;
  el.classList.add('visibile');
  document.getElementById('error-msg').classList.remove('visibile');
}

function nascondiMsg() {
  document.getElementById('error-msg').classList.remove('visibile');
  document.getElementById('success-msg').classList.remove('visibile');
}

async function login() {
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  if (!email || !password) return mostraErrore('Inserisci email e password');
  const btn = document.getElementById('btn-login');
  btn.disabled = true;
  btn.textContent = 'Accesso in corso...';
  const { error } = await sb.auth.signInWithPassword({ email, password });
  if (error) {
    mostraErrore('Email o password non corretti');
    btn.disabled = false;
    btn.textContent = 'Accedi';
  }
}

async function register() {
  const email = document.getElementById('reg-email').value.trim();
  const password = document.getElementById('reg-password').value;
  const password2 = document.getElementById('reg-password2').value;
  if (!email || !password) return mostraErrore('Compila tutti i campi');
  if (password.length < 8) return mostraErrore('La password deve essere di almeno 8 caratteri');
  if (password !== password2) return mostraErrore('Le password non coincidono');
  const btn = document.getElementById('btn-register');
  btn.disabled = true;
  btn.textContent = 'Registrazione in corso...';
  const { error } = await sb.auth.signUp({ email, password });
  if (error) {
    mostraErrore(error.message);
    btn.disabled = false;
    btn.textContent = 'Crea account';
  } else {
    mostraSuccesso('Controlla la tua email e clicca il link di conferma per attivare il tuo account!');
    btn.disabled = false;
    btn.textContent = 'Crea account';
  }
}

async function loginGoogle() {
  await sb.auth.signInWithOAuth({
    provider: 'google',
    options: { redirectTo: window.location.origin }
  });
}
</script>
</body>
</html>
